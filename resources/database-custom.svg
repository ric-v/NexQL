<svg viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cap gradient: lighter and brighter lavender/purple -->
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e9d5ff" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    
    <!-- Wall gradient: deeper violet to indigo -->
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
  </defs>

  <!-- Bottom Disk -->
  <!-- Wall -->
  <path d="M 4,15.7 C 4,16.804 8.418,17.7 12,17.7 15.582,17.7 20,16.804 20,15.7 V 18.7 C 20,19.804 15.582,20.7 12,20.7 8.418,20.7 4,19.804 4,18.7 Z" fill="url(#wallGrad)" />
  <!-- Cap -->
  <ellipse cx="12" cy="15.7" rx="8" ry="2" fill="url(#capGrad)" />

  <!-- Middle Disk -->
  <!-- Wall -->
  <path d="M 4,10.5 C 4,11.604 8.418,12.5 12,12.5 15.582,12.5 20,11.604 20,10.5 V 13.5 C 20,14.604 15.582,15.5 12,15.5 8.418,15.5 4,14.604 4,13.5 Z" fill="url(#wallGrad)" />
  <!-- Cap -->
  <ellipse cx="12" cy="10.5" rx="8" ry="2" fill="url(#capGrad)" />

  <!-- Top Disk -->
  <!-- Wall -->
  <path d="M 4,5.3 C 4,6.404 8.418,7.3 12,7.3 15.582,7.3 20,6.404 20,5.3 V 8.3 C 20,9.404 15.582,10.3 12,10.3 8.418,10.3 4,9.404 4,8.3 Z" fill="url(#wallGrad)" />
  <!-- Cap -->
  <ellipse cx="12" cy="5.3" rx="8" ry="2" fill="url(#capGrad)" />
</svg>
