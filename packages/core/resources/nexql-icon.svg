<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Database cylinder - generic database icon -->
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B8DEF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A5FCD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7EAAFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B8DEF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Cylinder body -->
  <path d="M 24 40 L 24 92 C 24 104 44 112 64 112 C 84 112 104 104 104 92 L 104 40"
        fill="url(#bodyGrad)" stroke="#2A4A9E" stroke-width="2"/>
  <!-- Bottom ellipse (hidden behind body) -->
  <ellipse cx="64" cy="92" rx="40" ry="16" fill="url(#bodyGrad)" stroke="#2A4A9E" stroke-width="2"/>
  <!-- Middle band -->
  <ellipse cx="64" cy="66" rx="40" ry="12" fill="none" stroke="#2A4A9E" stroke-width="1.5" opacity="0.4"/>
  <!-- Top ellipse -->
  <ellipse cx="64" cy="40" rx="40" ry="16" fill="url(#topGrad)" stroke="#2A4A9E" stroke-width="2"/>
  <!-- NQ text -->
  <text x="64" y="74" font-family="Arial, sans-serif" font-size="22" font-weight="bold"
        fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">NQ</text>
</svg>
