name: Platform smoke (nightly)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  hosted-postgres-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Neon smoke
        if: ${{ secrets.NEON_DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          set -euo pipefail
          psql "$DATABASE_URL" -c 'SELECT version();'
          psql "$DATABASE_URL" -c 'SHOW server_version_num;'

      - name: Supabase smoke
        if: ${{ secrets.SUPABASE_DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          set -euo pipefail
          psql "$DATABASE_URL" -c 'SELECT version();'
          psql "$DATABASE_URL" -c 'SHOW server_version_num;'
