name: Publish Nightly Extensions

permissions:
  contents: read

on:
  workflow_dispatch:

concurrency:
  group: publish-nightly
  cancel-in-progress: true

jobs:
  publish-nightly-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build --workspace=packages/core

      - name: Compute nightly version
        id: nightly_version
        run: |
          NIGHTLY_VERSION=$(node -e "const [maj,min]=require('./packages/core/package.json').version.split('.').map(Number); const nightlyMinor=min%2===0?min+1:min; process.stdout.write(maj+'.'+nightlyMinor+'.'+process.env.GITHUB_RUN_NUMBER)")
          echo "VERSION=$NIGHTLY_VERSION" >> $GITHUB_OUTPUT
          echo "Using nightly version: $NIGHTLY_VERSION"

      - name: Prepare nightly manifests for core
        env:
          NIGHTLY_VERSION: ${{ steps.nightly_version.outputs.VERSION }}
          OPENVSX_NIGHTLY_NAME: nexql-nightly
        run: node ./scripts/prepare-nightly-manifests.js --package=core

      - name: Package VS Code Marketplace nightly (core)
        id: package_marketplace
        working-directory: packages/core
        run: |
          cp package.json package.json.bak
          cp .nightly/package.marketplace.json package.json
          VSIX_FILE=$(node -e "const pkg=require('./package.json'); process.stdout.write(pkg.name+'-'+pkg.version+'.vsix')")
          npx @vscode/vsce package --pre-release
          mv package.json.bak package.json
          echo "VSIX_FILE=$VSIX_FILE" >> $GITHUB_OUTPUT

      - name: Publish core to VS Code Marketplace (pre-release)
        working-directory: packages/core
        run: |
          npx @vscode/vsce publish \
            --pre-release \
            --packagePath ${{ steps.package_marketplace.outputs.VSIX_FILE }} \
            -p ${{ secrets.VSCE_PAT }}

      - name: Package Open VSX nightly companion (core)
        id: package_openvsx
        working-directory: packages/core
        run: |
          cp package.json package.json.bak
          cp .nightly/package.openvsx.json package.json
          VSIX_FILE=$(node -e "const pkg=require('./package.json'); process.stdout.write(pkg.name+'-'+pkg.version+'.vsix')")
          npx @vscode/vsce package
          mv package.json.bak package.json
          echo "VSIX_FILE=$VSIX_FILE" >> $GITHUB_OUTPUT

      - name: Publish core to Open VSX (nightly companion)
        working-directory: packages/core
        run: |
          npx ovsx publish \
            ${{ steps.package_openvsx.outputs.VSIX_FILE }} \
            -p ${{ secrets.OVSX_PAT }}

      - name: Upload core nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-vsix-core
          path: packages/core/*.vsix
          retention-days: 30

  publish-nightly-extensions:
    needs: publish-nightly-core
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [ext-postgres, ext-mysql, ext-sqlite, ext-mssql, ext-oracle]
        include:
          - package: ext-postgres
            openvsx_nightly_name: postgres-explorer-nightly
          - package: ext-mysql
            openvsx_nightly_name: nexql-mysql-nightly
          - package: ext-sqlite
            openvsx_nightly_name: nexql-sqlite-nightly
          - package: ext-mssql
            openvsx_nightly_name: nexql-mssql-nightly
          - package: ext-oracle
            openvsx_nightly_name: nexql-oracle-nightly
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.package }}
        run: npm run build --workspace=packages/${{ matrix.package }}

      - name: Compute nightly version
        id: nightly_version
        run: |
          NIGHTLY_VERSION=$(node -e "const [maj,min]=require('./packages/${{ matrix.package }}/package.json').version.split('.').map(Number); const nightlyMinor=min%2===0?min+1:min; process.stdout.write(maj+'.'+nightlyMinor+'.'+process.env.GITHUB_RUN_NUMBER)")
          echo "VERSION=$NIGHTLY_VERSION" >> $GITHUB_OUTPUT
          echo "Using nightly version: $NIGHTLY_VERSION"

      - name: Prepare nightly manifests
        env:
          NIGHTLY_VERSION: ${{ steps.nightly_version.outputs.VERSION }}
          OPENVSX_NIGHTLY_NAME: ${{ matrix.openvsx_nightly_name }}
        run: node ./scripts/prepare-nightly-manifests.js --package=${{ matrix.package }}

      - name: Package VS Code Marketplace nightly
        id: package_marketplace
        working-directory: packages/${{ matrix.package }}
        run: |
          cp package.json package.json.bak
          cp .nightly/package.marketplace.json package.json
          VSIX_FILE=$(node -e "const pkg=require('./package.json'); process.stdout.write(pkg.name+'-'+pkg.version+'.vsix')")
          npx @vscode/vsce package --pre-release
          mv package.json.bak package.json
          echo "VSIX_FILE=$VSIX_FILE" >> $GITHUB_OUTPUT

      - name: Publish to VS Code Marketplace (pre-release)
        working-directory: packages/${{ matrix.package }}
        run: |
          npx @vscode/vsce publish \
            --pre-release \
            --packagePath ${{ steps.package_marketplace.outputs.VSIX_FILE }} \
            -p ${{ secrets.VSCE_PAT }}

      - name: Package Open VSX nightly companion
        id: package_openvsx
        working-directory: packages/${{ matrix.package }}
        run: |
          cp package.json package.json.bak
          cp .nightly/package.openvsx.json package.json
          VSIX_FILE=$(node -e "const pkg=require('./package.json'); process.stdout.write(pkg.name+'-'+pkg.version+'.vsix')")
          npx @vscode/vsce package
          mv package.json.bak package.json
          echo "VSIX_FILE=$VSIX_FILE" >> $GITHUB_OUTPUT

      - name: Publish to Open VSX (nightly companion)
        working-directory: packages/${{ matrix.package }}
        run: |
          npx ovsx publish \
            ${{ steps.package_openvsx.outputs.VSIX_FILE }} \
            -p ${{ secrets.OVSX_PAT }}

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-vsix-${{ matrix.package }}
          path: packages/${{ matrix.package }}/*.vsix
          retention-days: 30
