name: Publish Extensions
permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Get version from tag
        id: version
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$TAG_VERSION" >> $GITHUB_OUTPUT

          # Verify core package.json version matches tag
          PKG_VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "Core package.json version: $PKG_VERSION"

          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) doesn't match core package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build --workspace=packages/core

      - name: Package core
        run: npm run package --workspace=packages/core

      - name: Upload core VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix-core
          path: packages/core/*.vsix
          retention-days: 90

      - name: Publish core to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath packages/core/*.vsix -p ${{ secrets.VSCE_PAT }}

      - name: Publish core to Open VSX Registry
        run: npx ovsx publish packages/core/*.vsix -p ${{ secrets.OVSX_PAT }}

  publish-extensions:
    needs: publish-core
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [ext-postgres, ext-mysql, ext-sqlite, ext-mssql, ext-oracle]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.package }}
        run: npm run build --workspace=packages/${{ matrix.package }}

      - name: Package ${{ matrix.package }}
        run: npm run package --workspace=packages/${{ matrix.package }}

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.package }}
          path: packages/${{ matrix.package }}/*.vsix
          retention-days: 90

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath packages/${{ matrix.package }}/*.vsix -p ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        run: npx ovsx publish packages/${{ matrix.package }}/*.vsix -p ${{ secrets.OVSX_PAT }}

  create-release:
    needs: [publish-core, publish-extensions]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          path: vsix-artifacts
          pattern: vsix-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: vsix-artifacts/*.vsix
          draft: false
          prerelease: false
          generate_release_notes: true
