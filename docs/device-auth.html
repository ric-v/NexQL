<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>NexQL Cloud Sync — Authorize Device</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#07080E">
  <link rel="icon" type="image/png" href="assets/NexQL.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body.device-auth-page {
      margin: 0;
      min-height: 100vh;
      background: var(--bg, #faf9f5);
      color: var(--fg, #1a1917);
      font-family: var(--font-body, "Space Grotesk", system-ui, sans-serif);
    }

    .device-auth-header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--border, #d9d5cc);
      background: color-mix(in srgb, var(--bg, #faf9f5) 92%, transparent);
      backdrop-filter: blur(8px);
    }

    .device-auth-header-inner {
      max-width: 42rem;
      margin: 0 auto;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .device-auth-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: inherit;
    }

    .device-auth-logo img {
      width: 32px;
      height: 32px;
    }

    .device-auth-main {
      max-width: 28rem;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    .device-auth-card {
      padding: 1.75rem;
      border: 1px solid var(--landing-border, var(--border, #d9d5cc));
      border-radius: 14px;
      background: var(--landing-surface, var(--panel, #f0eee6));
    }

    .device-auth-card h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0.5rem 0 0.75rem;
      line-height: 1.25;
    }

    .device-auth-card p {
      color: var(--landing-muted, var(--muted, #6b665f));
      margin: 0 0 1.25rem;
      line-height: 1.55;
      font-size: 0.95rem;
    }

    .device-auth-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 0.875rem;
    }

    .device-auth-meta dt {
      color: var(--landing-muted, var(--muted, #6b665f));
      margin: 0;
    }

    .device-auth-meta dd {
      margin: 0;
      font-weight: 500;
    }

    .device-auth-code {
      font-family: var(--font-mono, "JetBrains Mono", monospace);
      font-size: 1.25rem;
      letter-spacing: 0.08em;
      padding: 0.65rem 0.85rem;
      border-radius: 8px;
      border: 1px solid var(--landing-border, var(--border, #d9d5cc));
      background: var(--bg, #faf9f5);
      margin-bottom: 1.25rem;
      text-align: center;
    }

    .device-auth-card label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 0.35rem;
      color: var(--fg, #1a1917);
    }

    .device-auth-card input {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 1rem;
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--landing-border, var(--border, #d9d5cc));
      background: var(--bg, #faf9f5);
      color: var(--fg, #1a1917);
      font: inherit;
    }

    .device-auth-card input.mono {
      font-family: var(--font-mono, "JetBrains Mono", monospace);
    }

    .device-auth-btn {
      width: 100%;
      padding: 0.8rem 1rem;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      background: var(--nex-indigo, #6c4cd6);
      color: #fff;
      font-family: inherit;
    }

    .device-auth-btn:hover:not(:disabled) {
      filter: brightness(1.06);
    }

    .device-auth-btn:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .device-auth-fallback {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--landing-border, var(--border, #d9d5cc));
    }

    .device-auth-fallback summary {
      cursor: pointer;
      font-size: 0.875rem;
      color: var(--landing-muted, var(--muted, #6b665f));
      user-select: none;
    }

    .device-auth-fallback[open] summary {
      margin-bottom: 0.75rem;
    }

    #authStatus {
      margin-top: 1rem;
      min-height: 1.25rem;
      font-size: 0.9rem;
      line-height: 1.45;
    }

    #authStatus.ok { color: #1a8f5a; }
    #authStatus.err { color: #c43d3d; }

    .device-auth-hidden { display: none !important; }
  </style>
</head>
<body class="device-auth-page">
  <header class="device-auth-header" role="banner">
    <div class="device-auth-header-inner">
      <a href="/" class="device-auth-logo" aria-label="NexQL home">
        <img src="assets/NexQL.png" alt="" width="32" height="32">
        <span class="brand-gradient" style="font-weight: 600; font-size: 1.1rem;">NexQL</span>
      </a>
    </div>
  </header>

  <main class="device-auth-main">
    <div class="device-auth-card">
      <span class="eyebrow">Cloud Sync</span>
      <h1 class="grad-text">Authorize this device</h1>
      <p id="authIntro">
        Confirm the device below to link it to your NexQL account. Cloud Sync requires an active
        <strong>Sponsor</strong> or <strong>Teams</strong> license.
      </p>

      <dl class="device-auth-meta" id="authMeta" hidden>
        <div><dt>Device</dt><dd id="authDeviceName">—</dd></div>
        <div><dt>Plan</dt><dd id="authTierLabel">—</dd></div>
      </dl>

      <div id="userCodeBlock" class="device-auth-hidden">
        <label for="userCode">User code</label>
        <input id="userCode" name="userCode" class="mono" autocomplete="one-time-code" required placeholder="XXXX-XXXX" readonly>
      </div>

      <form id="authForm">
        <div id="licenseFallback" class="device-auth-fallback device-auth-hidden">
          <details id="licenseDetails">
            <summary>Enter license key manually</summary>
            <label for="licenseKey">License key</label>
            <input id="licenseKey" name="licenseKey" class="mono" autocomplete="off" placeholder="NEXQL-…">
          </details>
        </div>
        <button type="submit" class="device-auth-btn" id="submitBtn">Authorize this device</button>
      </form>
      <div id="authStatus" role="status" aria-live="polite"></div>
    </div>
  </main>

  <script type="module" src="js/theme-loader.mjs"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const userCodeInput = document.getElementById('userCode');
    const userCodeBlock = document.getElementById('userCodeBlock');
    const licenseFallback = document.getElementById('licenseFallback');
    const authMeta = document.getElementById('authMeta');
    const authDeviceName = document.getElementById('authDeviceName');
    const authTierLabel = document.getElementById('authTierLabel');
    const authIntro = document.getElementById('authIntro');

    const userCode = (params.get('user_code') || '').trim().toUpperCase();
    const deviceName = (params.get('device') || '').trim();

    if (userCode) {
      userCodeInput.value = userCode;
      userCodeBlock.classList.remove('device-auth-hidden');
    }

    const TIER_LABELS = {
      sponsor: 'Sponsor',
      singularity: 'Teams',
    };

    async function loadStatus() {
      if (!userCode) {
        authIntro.textContent = 'Open this page from your editor after starting Cloud Sync setup, or enter your user code below.';
        userCodeBlock.classList.remove('device-auth-hidden');
        userCodeInput.removeAttribute('readonly');
        licenseFallback.classList.remove('device-auth-hidden');
        return;
      }

      try {
        const res = await fetch('/api/auth/status?user_code=' + encodeURIComponent(userCode));
        const data = await res.json().catch(() => ({}));
        if (data.bound) {
          authMeta.hidden = false;
          authDeviceName.textContent = data.device_name || deviceName || 'Your editor';
          authTierLabel.textContent = TIER_LABELS[data.tier] || data.tier || 'Sponsor+';
          authIntro.textContent = 'Your license is ready. Click below to authorize this device — no license key needed.';
        } else {
          licenseFallback.classList.remove('device-auth-hidden');
          if (deviceName) {
            authMeta.hidden = false;
            authDeviceName.textContent = deviceName;
            authTierLabel.textContent = '—';
          }
        }
      } catch {
        licenseFallback.classList.remove('device-auth-hidden');
      }
    }

    void loadStatus();

    document.getElementById('authForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const status = document.getElementById('authStatus');
      const btn = document.getElementById('submitBtn');
      const code = (userCodeInput.value || '').trim();
      if (!code) {
        status.textContent = 'Enter the user code from your editor.';
        status.className = 'err';
        return;
      }

      status.textContent = '';
      status.className = '';
      btn.disabled = true;

      const body = { user_code: code };
      const licenseKey = document.getElementById('licenseKey').value.trim();
      if (licenseKey) {
        body.licenseKey = licenseKey;
      }

      try {
        const res = await fetch('/api/auth/authorize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(data.error || 'Authorization failed');
        }
        status.textContent = 'Device authorized. Return to your editor — sync will continue automatically.';
        status.className = 'ok';
        btn.disabled = true;
      } catch (err) {
        status.textContent = err.message || 'Authorization failed';
        status.className = 'err';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
